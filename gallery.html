<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f2f2f2;
    padding:20px;
}

/* FILTER BUTTONS */
.filters{
    text-align:center;
    margin-bottom:20px;
}

.filters button{
    padding:8px 15px;
    margin:5px;
    border:none;
    background:#333;
    color:white;
    cursor:pointer;
    border-radius:20px;
    transition:0.3s;
}

.filters button:hover{
    background:#ff9800;
}

/* GALLERY GRID */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
    gap:15px;
}

.gallery-item{
    overflow:hidden;
    border-radius:10px;
    cursor:pointer;
}

.gallery-item img{
    width:100%;
    height:100%;
    display:block;
    transition:0.4s ease;
}

.gallery-item:hover img{
    transform:scale(1.1);
    filter:brightness(75%);
}

/* LIGHTBOX */
.lightbox{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.lightbox img{
    max-width:90%;
    max-height:80%;
    border-radius:10px;
}

.lightbox .buttons{
    margin-top:15px;
}

.lightbox button{
    padding:8px 15px;
    margin:0 10px;
    border:none;
    background:#ff9800;
    color:white;
    cursor:pointer;
    border-radius:5px;
}

.lightbox button:hover{
    background:#e68900;
}
</style>
</head>
<body>

<!-- FILTERS -->
<div class="filters">
    <button data-filter="all">All</button>
    <button data-filter="nature">Nature</button>
    <button data-filter="city">City</button>
    <button data-filter="animals">Animals</button>
</div>

<!-- GALLERY -->
<div class="gallery">
    <div class="gallery-item nature">
        <img src="https://picsum.photos/id/1015/600/400">
    </div>
    <div class="gallery-item city">
        <img src="https://picsum.photos/id/1011/600/400">
    </div>
    <div class="gallery-item animals">
        <img src="https://picsum.photos/id/1025/600/400">
    </div>
    <div class="gallery-item nature">
        <img src="https://picsum.photos/id/1039/600/400">
    </div>
    <div class="gallery-item city">
        <img src="https://picsum.photos/id/1043/600/400">
    </div>
    <div class="gallery-item animals">
        <img src="https://picsum.photos/id/1050/600/400">
    </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
    <img id="lightbox-img">
    <div class="buttons">
        <button id="prev">Prev</button>
        <button id="next">Next</button>
        <button id="close">Close</button>
    </div>
</div>

<script>
const galleryItems = document.querySelectorAll(".gallery-item");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");
const closeBtn = document.getElementById("close");
const filterButtons = document.querySelectorAll(".filters button");

let currentIndex = 0;

/* OPEN LIGHTBOX */
galleryItems.forEach((item, index) => {
    item.addEventListener("click", () => {
        currentIndex = index;
        lightbox.style.display = "flex";
        lightboxImg.src = item.querySelector("img").src;
    });
});

/* CLOSE */
closeBtn.addEventListener("click", () => {
    lightbox.style.display = "none";
});

/* NEXT */
nextBtn.addEventListener("click", () => {
    currentIndex = (currentIndex + 1) % galleryItems.length;
    lightboxImg.src = galleryItems[currentIndex].querySelector("img").src;
});

/* PREV */
prevBtn.addEventListener("click", () => {
    currentIndex = (currentIndex - 1 + galleryItems.length) % galleryItems.length;
    lightboxImg.src = galleryItems[currentIndex].querySelector("img").src;
});

/* CLOSE WHEN CLICK OUTSIDE */
lightbox.addEventListener("click", (e) => {
    if(e.target === lightbox){
        lightbox.style.display = "none";
    }
});

/* FILTER FUNCTION */
filterButtons.forEach(button => {
    button.addEventListener("click", () => {
        const filter = button.getAttribute("data-filter");

        galleryItems.forEach(item => {
            if(filter === "all" || item.classList.contains(filter)){
                item.style.display = "block";
            } else {
                item.style.display = "none";
            }
        });
    });
});
</script>

</body>
</html>
